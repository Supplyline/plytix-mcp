# Plytix MCP Server - Cloudflare Workers Configuration
#
# This configures the remote MCP server for Plytix PIM access.
# API credentials are provided per-request by the client (BYOK model).

name = "plytix-mcp"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# No secrets stored here - API key comes from client headers
# This enables the "bring your own API key" model

[vars]
PLYTIX_API_BASE = "https://pim.plytix.com"
PLYTIX_AUTH_URL = "https://auth.plytix.com/auth/api/get-token"

# Development settings
[dev]
port = 8787

# Build configuration
[build]
command = "npm run build:worker"

# KV namespace for OAuth token storage
# Create with: wrangler kv namespace create OAUTH_KV
# Then paste the ID below
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# OAuth requires a secret used to encrypt stored Plytix credentials at rest.
# It is NOT declared here (secrets never live in wrangler.toml). Set it with:
#   wrangler secret put OAUTH_TOKEN_SECRET
# Use a long random value (e.g. `openssl rand -hex 32`). When OAUTH_KV is
# configured but this secret is unset, the OAuth /authorize endpoint refuses
# to issue codes so credentials are never persisted in plaintext.

# Observability
[observability]
enabled = true
